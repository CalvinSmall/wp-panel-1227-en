<!DOCTYPE html>
<html lang="{{.Lang}}" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{.CSRFToken}}">
    <title>{{t .Lang "auth.login"}} - {{.PanelTitle}}</title>
    <link rel="stylesheet" href="{{.AssetPrefix}}/css/main.css?v={{.AssetVersion}}">
    <script defer src="{{.AssetPrefix}}/js/alpine.min.js?v={{.AssetVersion}}"></script>
    <script>
        window.WP_PANEL_I18N = { lang: "{{.Lang}}", messages: {{.MessagesJSON}} };
    </script>
    <script src="{{.AssetPrefix}}/js/app.js?v={{.AssetVersion}}"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen" data-panel-prefix="/{{.RandomSuffix}}" data-lang="{{.Lang}}">
    <div class="min-h-screen flex items-center justify-center" x-data="loginForm()">
        <div class="card max-w-md w-full">
            <div class="text-center mb-8">
                <div class="w-16 h-16 mx-auto mb-4">
                    <img src="{{.AssetPrefix}}/logo.png" alt="WP Panel" class="w-16 h-16 rounded-xl">
                </div>
                <h2 class="text-2xl font-bold text-white">WP Panel</h2>
                <p class="text-gray-400 mt-2">{{t .Lang "auth.login_prompt"}}</p>
                <div class="mt-4 text-xs text-gray-500">
                    <a href="?lang=zh-CN" class="{{if eq .Lang "zh-CN"}}text-blue-400{{else}}text-gray-400{{end}}">{{t .Lang "language.chinese"}}</a>
                    <span class="mx-2">/</span>
                    <a href="?lang=en-US" class="{{if eq .Lang "en-US"}}text-blue-400{{else}}text-gray-400{{end}}">{{t .Lang "language.english"}}</a>
                </div>
            </div>

            <form method="POST" @submit.prevent="login" x-show="!loading">
                <div class="mb-4">
                    <label class="label">{{t .Lang "auth.username"}}</label>
                    <input type="text" x-model="username" name="username" class="input-field" placeholder="admin" autocomplete="username">
                </div>
                <div class="mb-6">
                    <label class="label">{{t .Lang "auth.password"}}</label>
                    <input type="password" x-model="password" name="password" class="input-field" placeholder="{{t .Lang "auth.password_placeholder"}}" autocomplete="current-password">
                </div>

                <div x-cloak x-show="error" class="mb-4 p-3 bg-red-900/50 border border-red-700 rounded-lg text-red-300 text-sm"
                     x-text="error"></div>

                <button type="submit" class="btn-primary w-full" :disabled="!username || !password">
                    {{t .Lang "auth.login"}}
                </button>
            </form>

            <div x-cloak x-show="loading && !success" class="text-center py-4">
                <div class="animate-spin w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mx-auto"></div>
                <p class="text-gray-400 mt-2">{{t .Lang "auth.validating"}}</p>
            </div>

            <div x-show="success" class="text-center py-8">
                <div class="w-12 h-12 bg-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <p class="text-green-400 font-medium mb-6">{{t .Lang "auth.verified"}}</p>
                <div class="p-5 rounded-lg mx-auto max-w-sm" style="background-color: #0f172a; border: 1px solid #334155;">
                    <p class="text-gray-300 text-sm leading-relaxed italic" x-text="quote"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
    // Random quotes displayed after successful login — kept in Chinese per product requirement.
    const quotes = [
        "A journey of a thousand miles begins with a single step.\n— Laozi",
        "A craftsman must sharpen his tools to do his work well.\n— Confucius",
        "Without accumulating small steps, one cannot reach a thousand miles.\n— Xunzi",
        "Learning without thinking is useless; thinking without learning is dangerous.\n— Confucius",
        "All difficult things in the world arise from easy things; all great things arise from small things.\n— Laozi",
        "Success in work comes from diligence; failure from laziness. Character is formed by thought; destroyed by following the crowd.\n— Han Yu",
        "To know what you know and what you do not know — that is true knowledge.\n— Confucius",
        "The road ahead is long and winding; I will search high and low.\n— Qu Yuan",
        "Learn widely, inquire carefully, think carefully, discriminate clearly, and practice earnestly.\n— Doctrine of the Mean",
        "What you read on paper feels shallow; true understanding comes from practice.\n— Lu You",
        "Perseverance can carve metal and stone.\n— Xunzi",
        "When three people walk together, there must be one who can teach me.\n— Confucius",
        "Haste does not lead to success; chasing small gains accomplishes nothing great.\n— Confucius",
        "The noble-minded are open-hearted; the petty-minded are always anxious.\n— Confucius",
        "Heaven never ceases to move; the noble-minded never stop striving.\n— Book of Changes",
        "The greatest truth is simplest; practical action is what matters.",
        "Code is written for humans to read, and only incidentally for machines to execute.\n— Harold Abelson",
        "Simplicity is a prerequisite for reliability.\n— Edsger Dijkstra",
        "Any fool can write code that a computer can understand. Good programmers write code that humans can understand.\n— Martin Fowler",
        "Make it work, make it right, make it fast.\n— Kent Beck",
    ];

    function loginForm() {
        return {
            username: '',
            password: '',
            loading: false,
            success: false,
            quote: '',
            error: '',
            async login() {
                if (!this.username || !this.password) {
                    this.error = t('auth.missing_credentials');
                    return;
                }
                this.loading = true;
                this.error = '';
                try {
                    const resp = await api('/auth/login', {
                        method: 'POST',
                        body: { username: this.username, password: this.password },
                        silent: true
                    });
                    if (resp.success) {
                        this.success = true;
                        this.quote = quotes[Math.floor(Math.random() * quotes.length)];
                        setTimeout(() => {
                            window.location.href = '/' + document.body.dataset.panelPrefix.replace('/', '') + '/';
                        }, 1800);
                    } else {
                        this.error = resp.message || t('auth.login_failed');
                        this.loading = false;
                    }
                } catch (e) {
                    this.error = e.message || t('auth.connect_failed');
                    this.loading = false;
                }
            }
        }
    }
    </script>
</body>
</html>
